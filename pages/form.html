<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            color: rgba(213, 238, 24,0.5);
        }
        label{
            color: rgb(46, 2, 46);
        }
        .inp1{
            height: 40px;
            width: 250px;
        }
        #pwd{
            border: 2px solid green;
        }
    </style>
</head>
<body>
    <h1 style="color: rgb(1, 63, 42); background-color:rgb(205, 243, 230); padding:22px; border:1px solid rgb(88, 115, 88)">Forms</h1>
    <form >
        specificity
        <label for="username"  class="label">Username: </label>
        <input type="text" name="username" class="inp1" id="username" placeholder="Enter you username" > <br> <br>
        <label for="pwd">Password: </label>
        <input type="password" name="password" id="pwd" value="asd123" placeholder="Enter your password" readonly> <br><br>
        <label for="email">Email: </label>
        <input type="email" name="email" class="inp1" id="email" placeholder="Enter your email"> <br><br>
        <label for="">Date of Birth: </label>
        <input type="date" name="dob" id=""> <br><br>
        <label for="">Time: </label>
        <input type="time" name="time" id=""> <br> <br>
        <input type="file" name="profile" id="" accept="image/*" required> <br> <br>
        <textarea name="address" id="" rows="3" cols="50">
        </textarea> <br> <br>
        <label for="">College: </label>
        <select name="college" id="">
            <option value="" disabled selected>-------Select a college-------</option>
            <option value="scms">SCMS,Angamaly</option>
            <option value="cms">CMS, Coimbathore</option>
            <option value="sct">SCT, Thiruvananthapuram</option>
            <option value="sngc">SNGC, Kadayiruppu</option>
        </select> <br><br>
        <label for="">Gender:</label>
        <input type="radio" value="male" name="gender" id=""> Male
        <input type="radio" value="female" name="gender" id=""> Female <br> <br>
        <label for="">Skills: </label>
        <input type="checkbox" name="skills" value="html" id=""> HTML
        <input type="checkbox" name="skills" value="css" id=""> CSS
        <input type="checkbox" name="skills" value="js" id=""> JS <br><br>
        <input type="button" value="submit">
        <input type="submit" value="Add data">
        <input type="reset" value="Clear form">
    </form>
</body>
</html>
