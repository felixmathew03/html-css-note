<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <h1>Table</h1>

    <table border="1">
        <caption>Student's table</caption>
        <thead>
            <tr>
                <th >Name</th>
                <th>Roll No.</th>
                <th>Course</th>
                <th>Subject</th>
                <th>mark</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">Anu</td>
                <td rowspan="2">12</td>
                <td rowspan="2">BCA</td>
                <td>Maths</td>
                <td>50</td>
            </tr>
            <tr>
                <td>Science</td>
                <td>52</td>
            </tr>
            <tr>
                <td colspan="4"  align="right">Total Marks:</td>
                <td>102</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
