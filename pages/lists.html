<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lists</title>
    </head>
    <body>
        <ol type="A" start="5">
            <li>Orange</li>
            <li>Apple</li>
            <li>Strawberry</li>
            <li>Banana</li>
            <li>Pineapple</li>
            <li>Mango</li>
            <li>Water Melon</li>
        </ol>

        <!-- unordered list -->
        <ul type="circle">
            <li>Tomato</li>
            <li>Cabbage</li>
            <li>Onion</li>
            <li>Cucumber</li>
            <li>Carrot</li>
            <li>Beetroot</li>
            <li>Potato</li>
            <li>Pumkin</li>
            <li>Spinach</li>
        </ul>
    </body>
</html>
